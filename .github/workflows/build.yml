name: Build Emacs Portable

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:  # Manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Emacs
        run: sudo apt-get update && sudo apt-get install -y emacs-nox

      - name: Run build script
        run: ./build.sh

      - name: Run tests
        run: |
          cd build/.emacs.d
          emacs --batch \
            --eval "(setq user-emacs-directory \"$(pwd)/\")" \
            -l early-init.el \
            -l init.el \
            -l ../../test-config.el

      - name: Create zip
        run: |
          cd build
          zip -r ../emacs-portable.zip .emacs.d/

      - name: Upload artifact (PR / manual)
        uses: actions/upload-artifact@v4
        with:
          name: emacs-portable
          path: emacs-portable.zip
          retention-days: 90

      - name: Create releases
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Versioned release (kept forever)
          VERSION="v$(date -u +%Y%m%d-%H%M%S)"
          SHORT_SHA="${GITHUB_SHA::7}"

          gh release create "${VERSION}" emacs-portable.zip \
            --title "Build ${VERSION}" \
            --notes "Build from commit ${SHORT_SHA} ($(date -u +%Y-%m-%d %H:%M UTC))

          **Download:** \`emacs-portable.zip\`"

          # Update rolling 'latest' release
          gh release delete latest --yes 2>/dev/null || true
          git tag -f latest
          git push -f origin latest

          gh release create latest emacs-portable.zip \
            --title "Latest Build" \
            --notes "Latest build — always points to newest.
          Same as **${VERSION}** (commit ${SHORT_SHA}).

          For older versions, see [all releases](../../releases).

          **Usage:**
          \`\`\`bash
          unzip emacs-portable.zip -d ~
          emacs
          \`\`\`"
